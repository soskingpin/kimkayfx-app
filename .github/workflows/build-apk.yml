name: Build Flutter APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      
      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > android/app/google-services.json
      
      - name: Ensure Android V2 Embedding
        run: |
          # 1. Ensure meta-data in AndroidManifest.xml
          if ! grep -q "flutterEmbedding" android/app/src/main/AndroidManifest.xml; then
            sed -i '/<application>/a \        <meta-data android:name="flutterEmbedding" android:value="2" />' android/app/src/main/AndroidManifest.xml
          fi
          
          # 2. Ensure MainActivity extends FlutterActivity (V2)
          MAIN_ACTIVITY="android/app/src/main/kotlin/com/kimkayfx/kimkayfx_user_app/MainActivity.kt"
          if [ -f "$MAIN_ACTIVITY" ]; then
            # Replace old import with new V2 import
            sed -i 's/io.flutter.app.FlutterActivity/io.flutter.embedding.android.FlutterActivity/g' "$MAIN_ACTIVITY"
            # Ensure class extends FlutterActivity
            sed -i 's/class MainActivity: FlutterActivity()/class MainActivity: FlutterActivity()/g' "$MAIN_ACTIVITY"
          fi
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --release --split-per-abi
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 14
