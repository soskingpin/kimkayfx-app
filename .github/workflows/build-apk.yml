name: Build Flutter APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      
      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > android/app/google-services.json
      
      - name: Ensure Android V2 Embedding (Manifest Fix)
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # Remove any existing flutterEmbedding meta-data first (avoid duplicates)
          sed -i '/flutterEmbedding/d' "$MANIFEST"
          # Add the EXACT meta-data tag Flutter 3.19+ requires
          sed -i '/<application>/a \        <meta-data android:name="flutterEmbedding" android:value="2" />' "$MANIFEST"
          # Verify it was added
          grep "flutterEmbedding" "$MANIFEST" || exit 1
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --release --split-per-abi
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 14
