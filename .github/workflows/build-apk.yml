name: Build Flutter APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
      
      - name: Fix Android Project
        run: |
          # Let Flutter auto-fix the Android embedding
          flutter create . --platforms=android --no-overwrite
          
          # Ensure google-services plugin is applied (handle both .gradle and .gradle.kts)
          if [ -f "android/app/build.gradle" ]; then
            grep -q "com.google.gms.google-services" android/app/build.gradle || echo -e "\napply plugin: 'com.google.gms.google-services'" >> android/app/build.gradle
          elif [ -f "android/app/build.gradle.kts" ]; then
            grep -q "google-services" android/app/build.gradle.kts || echo -e '\nplugins { id("com.google.gms.google-services") }' >> android/app/build.gradle.kts
          fi
          
          # Ensure namespace exists in build.gradle
          if [ -f "android/app/build.gradle" ]; then
            grep -q "namespace" android/app/build.gradle || sed -i '/android {/a \    namespace "com.kimkayfx.kimkayfx_user_app"' android/app/build.gradle
          fi
      
      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > android/app/google-services.json
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --release --split-per-abi
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 14
