name: Build Flutter APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
      
      - name: Fix Android Project
        run: |
          # Use correct project name
          flutter create . --platforms=android --no-overwrite --project-name kimkayfx_app
          
          # 1. Add Google Services classpath to ROOT build.gradle
          if [ -f "android/build.gradle" ]; then
            # Add classpath inside buildscript dependencies if not present
            if ! grep -q "com.google.gms:google-services" android/build.gradle; then
              sed -i '/dependencies {/a \        classpath "com.google.gms:google-services:4.4.0"' android/build.gradle
            fi
          fi
          
          # 2. Apply Google Services plugin to APP build.gradle (at the very end)
          if [ -f "android/app/build.gradle" ]; then
            # Add apply plugin at the END of the file if not present
            if ! grep -q "com.google.gms.google-services" android/app/build.gradle; then
              echo "" >> android/app/build.gradle
              echo "apply plugin: 'com.google.gms.google-services'" >> android/app/build.gradle
            fi
          fi
          
          # 3. Ensure namespace exists for Android V2
          if [ -f "android/app/build.gradle" ]; then
            if ! grep -q "namespace" android/app/build.gradle; then
              sed -i '/android {/a \    namespace "com.kimkayfx.kimkayfx_user_app"' android/app/build.gradle
            fi
          fi
          
          # 4. Ensure V2 embedding meta-data in AndroidManifest.xml
          if [ -f "android/app/src/main/AndroidManifest.xml" ]; then
            if ! grep -q "flutterEmbedding" android/app/src/main/AndroidManifest.xml; then
              sed -i '/<application>/a \        <meta-data android:name="flutterEmbedding" android:value="2" />' android/app/src/main/AndroidManifest.xml
            fi
          fi
      
      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > android/app/google-services.json
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --release --split-per-abi
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 14
